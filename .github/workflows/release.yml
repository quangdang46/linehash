name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: linehash

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}" -p "$BINARY_NAME"
          else
            cargo build --release --locked --target "${{ matrix.target }}" -p "$BINARY_NAME"
          fi

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGE_DIR="${BINARY_NAME}-${VERSION}-${{ matrix.name }}"
          mkdir -p "$STAGE_DIR"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "$STAGE_DIR/"
          cp README.md LICENSE* "$STAGE_DIR/" 2>/dev/null || true
          tar -czf "${STAGE_DIR}.tar.gz" "$STAGE_DIR"
          shasum -a 256 "${STAGE_DIR}.tar.gz" | awk '{print $1}' > "${STAGE_DIR}.tar.gz.sha256"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME"
          $stageDir = "$env:BINARY_NAME-$version-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BINARY_NAME.exe" "$stageDir/$env:BINARY_NAME.exe"
          if (Test-Path README.md) { Copy-Item README.md $stageDir }
          Get-ChildItem LICENSE* -ErrorAction SilentlyContinue | Copy-Item -Destination $stageDir -ErrorAction SilentlyContinue
          Compress-Archive -Path "$stageDir/*" -DestinationPath "$stageDir.zip" -Force
          $hash = (Get-FileHash "$stageDir.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -NoNewline "$stageDir.zip.sha256" $hash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.archive_ext }}
            ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.archive_ext }}.sha256

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
